name: Tag and publish release

# Runs on every push to main (i.e. every merged release or hotfix PR). If the
# version in the plugin header has no matching tag yet, it verifies the version
# strings agree, tags MAIN'S TIP, creates the GitHub release with notes taken
# from the readme.txt changelog block, builds the distributable zip and
# attaches it — the whole manual tail of the old release flow.
#
# Why the zip is attached here rather than left to release.yml: the release
# may be created with the workflow's own GITHUB_TOKEN (see below), and
# bot-created releases do not trigger other workflows, so release.yml could
# never be relied on to fire. release.yml remains as the path for releases
# published by hand.
#
# Attribution: the release is created with the RELEASE_PAT secret when it
# exists (a fine-grained PAT, Contents read/write on this repository), so the
# release shows the maintainer as its author instead of github-actions[bot].
# Without the secret it falls back to GITHUB_TOKEN and everything still works,
# just bot-attributed. A PAT-created release DOES trigger release.yml, so the
# generated notes carry a hidden published-by marker that release.yml checks
# to skip releases this workflow already finished.
#
# Tagging main's tip (not the version-bump commit) removes the failure mode
# that shipped 1.10.0 short: after a merge-commit release PR the two trees are
# identical, and a tag at the tip can never miss code that main already has.
#
# If the tag already exists (e.g. a docs-only merge with no version bump) the
# run is a quiet no-op. If the tag is missing but the version strings disagree,
# the run fails loudly so the problem is seen before anyone installs anything.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v7

      - name: Read the version and decide whether to release
        id: version
        run: |
          set -euo pipefail
          version="$(sed -nE 's/^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*([0-9][0-9A-Za-z.-]*).*/\1/p' daveden-builderius-enhancements.php | head -n1)"
          if [ -z "$version" ]; then
            echo "::error::Could not read the Version header from the main plugin file."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$version" > /dev/null 2>&1; then
            echo "Tag v$version already exists — nothing to release."
            echo "release=no" >> "$GITHUB_OUTPUT"
          else
            echo "release=yes" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify the version strings agree
        if: steps.version.outputs.release == 'yes'
        run: |
          set -euo pipefail
          expected="${{ steps.version.outputs.version }}"

          define="$(sed -nE "s/^[[:space:]]*define\([[:space:]]*'DBE_VERSION'[[:space:]]*,[[:space:]]*'([0-9][0-9A-Za-z.-]*)'.*/\1/p" daveden-builderius-enhancements.php | head -n1)"
          stable="$(sed -nE 's/^Stable tag:[[:space:]]*([0-9][0-9A-Za-z.-]*).*/\1/p' readme.txt | head -n1)"

          fail=0
          for pair in "DBE_VERSION:$define" "readme Stable tag:$stable"; do
            name="${pair%%:*}"; value="${pair#*:}"
            if [ "$value" != "$expected" ]; then
              echo "::error::$name is '$value' but the plugin header says '$expected'. Fix the mismatch and merge again."
              fail=1
            fi
          done

          if ! grep -qE "^= $(printf '%s' "$expected" | sed 's/\./\\./g') =" readme.txt; then
            echo "::error::readme.txt has no '= $expected =' changelog block."
            fail=1
          fi

          [ "$fail" -eq 0 ] || exit 1

      - name: Extract the release notes from readme.txt
        if: steps.version.outputs.release == 'yes'
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          awk -v ver="$version" '
            $0 ~ "^= " ver " =$" { in_block = 1; next }
            in_block && /^= /    { exit }
            in_block             { print }
          ' readme.txt | sed -e '1{/^$/d}' > release-notes.md
          {
            echo ""
            echo "Full notes: [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/v$version/CHANGELOG.md)"
            # Hidden marker (HTML comments don't render): tells release.yml
            # this release was published, zip attached, by auto-release.
            echo ""
            echo "<!-- published-by: auto-release -->"
          } >> release-notes.md
          echo "--- release notes ---"
          cat release-notes.md

      - name: Tag main's tip
        if: steps.version.outputs.release == 'yes'
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$version" -m "Release $version"
          git push origin "v$version"

      - name: Build the distributable zip
        if: steps.version.outputs.release == 'yes'
        run: bash bin/build-zip.sh

      - name: Create the GitHub release with the zip attached
        if: steps.version.outputs.release == 'yes'
        env:
          # RELEASE_PAT attributes the release to the maintainer's profile;
          # absent, the bot token keeps the pipeline working (bot-attributed).
          GH_TOKEN: ${{ secrets.RELEASE_PAT || github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          gh release create "v$version" \
            --title "$version" \
            --notes-file release-notes.md \
            dist/daveden-builderius-enhancements.zip
